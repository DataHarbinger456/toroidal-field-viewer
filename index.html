<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Toroidal Field Viewer</title>
  <link rel="stylesheet" href="/src/styles/controls.css" />
</head>
<body>
  <canvas id="viewer"></canvas>
  <div id="controls">
    <button id="btn-mode" title="Toggle glass/solid mode">SOLID</button>
    <button id="btn-theme" title="Toggle light/dark theme">LIGHT</button>
    <button id="btn-torus" title="Toggle torus wireframe" class="active">TORUS</button>
    <button id="btn-grid" title="Toggle lat/lon grid" class="active">GRID</button>
    <button id="btn-map" title="Toggle country borders" class="active">MAP</button>
    <button id="btn-clear" title="Clear all highlights">CLEAR</button>
    <button id="btn-export" title="Export PNG">EXPORT</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
